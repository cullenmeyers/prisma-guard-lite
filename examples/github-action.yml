name: Prisma migration guard

on:
  pull_request:

jobs:
  prisma-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npx prisma-guard-lite --since origin/main --fail-on high
